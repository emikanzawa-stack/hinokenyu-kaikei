<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日野剣友会 会計ヘルパー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 16px; max-width: 480px; margin: 0 auto; }
  h1 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .month-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #fff; border-radius: 12px; padding: 12px; border: 0.5px solid #e0e0e0; }
  .month-row label { font-size: 14px; color: #666; white-space: nowrap; }
  .month-row select { flex: 1; font-size: 15px; border: none; outline: none; background: transparent; }
  .sec-label { font-size: 13px; color: #666; font-weight: 500; margin: 0 0 10px; }
  .entry-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .entry-card .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .entry-card .row-single { margin-bottom: 8px; }
  .field-label { font-size: 11px; color: #999; margin-bottom: 3px; }
  .entry-card input, .entry-card select { font-size: 15px; width: 100%; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; outline: none; background: #fafafa; }
  .entry-card input[type="number"] { text-align: right; }
  .entry-card input:focus, .entry-card select:focus { border-color: #aaa; background: #fff; }
  .remove-row { display: flex; justify-content: flex-end; margin-top: 4px; }
  .remove-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 13px; padding: 4px 0; }
  .add-btn { width: 100%; font-size: 14px; padding: 12px; margin-bottom: 20px; background: #fff; border: 0.5px dashed #ccc; border-radius: 12px; cursor: pointer; color: #666; }
  .add-btn:active { background: #f0f0f0; }
  .save-btn { width: 100%; font-size: 15px; padding: 14px; margin-bottom: 8px; background: #1a73e8; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .save-btn:active { background: #1557b0; }
  .load-btn { width: 100%; font-size: 14px; padding: 12px; margin-bottom: 8px; background: #fff; border: 0.5px solid #1a73e8; border-radius: 12px; cursor: pointer; color: #1a73e8; font-weight: 500; }
  .load-btn:active { background: #e8f0fe; }
  .save-status { font-size: 13px; text-align: center; margin-bottom: 16px; min-height: 20px; color: #666; }
  .save-status.success { color: #1e8a44; }
  .save-status.error { color: #d32f2f; }
  .divider { border: none; border-top: 0.5px solid #e0e0e0; margin: 20px 0; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .metric { background: #fff; border-radius: 12px; padding: 12px; border: 0.5px solid #e0e0e0; }
  .metric-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 500; }
  .metric-value.income { color: #1e8a44; }
  .metric-value.expense { color: #d32f2f; }
  .metric-wide { grid-column: 1 / -1; }
  .report-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0e0; overflow: hidden; margin-bottom: 10px; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .report-table th { background: #f5f5f5; padding: 8px 10px; text-align: left; font-weight: 500; color: #666; border-bottom: 0.5px solid #e0e0e0; white-space: nowrap; }
  .report-table td { padding: 8px 10px; border-bottom: 0.5px solid #f0f0f0; vertical-align: top; }
  .report-table tr:last-child td { border-bottom: none; }
  .report-table .num { text-align: right; }
  .report-table .income-row td { background: #f8fff9; }
  .report-table .expense-row td { background: #fff8f8; }
  .report-table .total-row td { background: #f5f5f5; font-weight: 500; border-top: 0.5px solid #e0e0e0; }
  .empty-msg { padding: 20px; text-align: center; color: #999; font-size: 13px; }
  .copy-btn { width: 100%; font-size: 14px; padding: 12px; background: #fff; border: 0.5px solid #ccc; border-radius: 12px; cursor: pointer; color: #333; }
  .copy-btn:active { background: #f0f0f0; }
</style>
</head>
<body>
<h1>日野剣友会 会計ヘルパー</h1>

<div class="month-row">
  <label>表示期間</label>
  <select id="target-month"></select>
</div>

<p class="sec-label">収入</p>
<div id="income-rows"></div>
<button class="add-btn" onclick="addRow('income')">＋ 収入を追加</button>

<p class="sec-label">支出</p>
<div id="expense-rows"></div>
<button class="add-btn" onclick="addRow('expense')">＋ 支出を追加</button>

<button class="save-btn" id="save-btn" onclick="saveToSheets()">スプレッドシートに保存</button>
<button class="load-btn" id="load-btn" onclick="loadFromSheets()">スプレッドシートから読み込む</button>
<p class="save-status" id="save-status"></p>

<hr class="divider">

<div class="metrics">
  <div class="metric">
    <p class="metric-label">収入合計</p>
    <p class="metric-value income" id="total-income">¥0</p>
  </div>
  <div class="metric">
    <p class="metric-label">支出合計</p>
    <p class="metric-value expense" id="total-expense">¥0</p>
  </div>
  <div class="metric metric-wide">
    <p class="metric-label">収支差額</p>
    <p class="metric-value" id="total-balance">¥0</p>
  </div>
</div>

<p class="sec-label">レポート</p>
<div class="report-wrap">
  <div id="report-table-container"><div class="empty-msg">項目を入力するとレポートが生成されます</div></div>
</div>
<button class="copy-btn" onclick="copyReport()">テキストをコピー</button>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxhfufrynJCNH-HiELIJqiyAnNccmFuR1skIi86gE0oprwtFIT5TLc9e25wmJGojGwwbA/exec';
const INCOME_CATS = ['繰越金','会費','BBQ会費','利息','PTAスポレク講師料','会費返金'];
const EXPENSE_CATS = ['交通費','年会費','参加費','活動費','保険(手数料等込)','雑費'];
const MONTHS = ['2026年4月','2026年5月','2026年6月','2026年7月','2026年8月','2026年9月','2026年10月','2026年11月','2026年12月','2027年1月','2027年2月','2027年3月'];

let incomeRows = [], expenseRows = [], rowId = 0;

function initMonth() {
  const sel = document.getElementById('target-month');
  const allOpt = document.createElement('option');
  allOpt.value = '通年'; allOpt.textContent = '通年';
  sel.appendChild(allOpt);
  MONTHS.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m; sel.appendChild(o);
  });
  sel.value = '通年';
  sel.addEventListener('change', updateSummary);
}

function addRow(type) {
  const id = rowId++;
  const arr = type === 'income' ? incomeRows : expenseRows;
  arr.push({ id, date: '', name: '', category: type === 'income' ? INCOME_CATS[0] : EXPENSE_CATS[0], amount: '' });
  renderRows(type);
}

function removeRow(type, id) {
  if (type === 'income') incomeRows = incomeRows.filter(r => r.id !== id);
  else expenseRows = expenseRows.filter(r => r.id !== id);
  renderRows(type); updateSummary();
}

function renderRows(type) {
  const arr = type === 'income' ? incomeRows : expenseRows;
  const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  const container = document.getElementById(type + '-rows');
  container.innerHTML = arr.map(row => `
    <div class="entry-card">
      <div class="row">
        <div><p class="field-label">日付</p>
          <input type="date" value="${row.date}" oninput="updateField('${type}',${row.id},'date',this.value)" /></div>
        <div><p class="field-label">金額（円）</p>
          <input type="number" placeholder="0" value="${row.amount}" min="0" step="100" oninput="updateField('${type}',${row.id},'amount',this.value)" /></div>
      </div>
      <div class="row-single"><p class="field-label">摘要</p>
        <input type="text" placeholder="例：4月分会費" value="${row.name}" oninput="updateField('${type}',${row.id},'name',this.value)" /></div>
      <div class="row-single"><p class="field-label">カテゴリ</p>
        <select onchange="updateField('${type}',${row.id},'category',this.value)">
          ${cats.map(c => `<option value="${c}" ${c===row.category?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="remove-row"><button class="remove-btn" onclick="removeRow('${type}',${row.id})">× 削除</button></div>
    </div>`).join('');
}

function updateField(type, id, field, value) {
  const arr = type === 'income' ? incomeRows : expenseRows;
  const row = arr.find(r => r.id === id);
  if (row) row[field] = value;
  updateSummary();
}

function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

function getMonthKey(dateStr) {
  const m = dateStr.match(/(\d+)\//);
  if (!m) return null;
  const month = parseInt(m[1]);
  return month >= 4 ? `2026年${month}月` : `2027年${month}月`;
}

function filterRows(rows, selected) {
  if (selected === '通年') return rows;
  return rows.filter(r => getMonthKey(r.date) === selected);
}

function updateSummary() {
  const selected = document.getElementById('target-month').value;
  const fi = filterRows(incomeRows, selected);
  const fe = filterRows(expenseRows, selected);
  const ti = fi.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  const te = fe.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  const bal = ti - te;
  document.getElementById('total-income').textContent = '¥' + fmt(ti);
  document.getElementById('total-expense').textContent = '¥' + fmt(te);
  const balEl = document.getElementById('total-balance');
  balEl.textContent = (bal >= 0 ? '¥' : '▲¥') + fmt(Math.abs(bal));
  balEl.className = 'metric-value ' + (bal >= 0 ? '' : 'expense');
  updateReport(fi, fe, selected, ti, te, bal);
}

function updateReport(fi, fe, selected, ti, te, bal) {
  const container = document.getElementById('report-table-container');
  const allRows = [
    ...fi.map(r => ({ ...r, type: 'income' })),
    ...fe.map(r => ({ ...r, type: 'expense' }))
  ].sort((a, b) => a.date.replace(/[^\d]/g,'').padStart(4,'0').localeCompare(b.date.replace(/[^\d]/g,'').padStart(4,'0')));

  if (allRows.length === 0) {
    container.innerHTML = '<div class="empty-msg">項目を入力するとレポートが生成されます</div>';
    return;
  }

  let running = 0;
  let rows = '';
  allRows.forEach(r => {
    const amt = parseFloat(r.amount) || 0;
    if (r.type === 'income') running += amt; else running -= amt;
    const rowClass = r.type === 'income' ? 'income-row' : 'expense-row';
    const ic = r.type === 'income' ? '¥' + fmt(amt) : '';
    const ec = r.type === 'expense' ? '¥' + fmt(amt) : '';
    const bc = (running >= 0 ? '¥' : '▲¥') + fmt(Math.abs(running));
    rows += `<tr class="${rowClass}">
      <td>${r.date||'　'}</td>
      <td>${r.name||r.category}</td>
      <td class="num">${ic}</td>
      <td class="num">${ec}</td>
      <td class="num">${bc}</td>
    </tr>`;
  });

  container.innerHTML = `
    <table class="report-table">
      <thead><tr>
        <th>日付</th><th>摘要</th><th>収入</th><th>支出</th><th>残高</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="total-row">
        <td colspan="2">合計</td>
        <td class="num">¥${fmt(ti)}</td>
        <td class="num">¥${fmt(te)}</td>
        <td class="num">${bal>=0?'¥':'▲¥'}${fmt(Math.abs(bal))}</td>
      </tr></tfoot>
    </table>`;
}

async function saveToSheets() {
  const allRows = [
    ...incomeRows.map(r => ({ ...r, type: 'income' })),
    ...expenseRows.map(r => ({ ...r, type: 'expense' }))
  ].filter(r => r.amount)
   .sort((a, b) => a.date.replace(/[^\d]/g,'').padStart(4,'0').localeCompare(b.date.replace(/[^\d]/g,'').padStart(4,'0')));

  if (allRows.length === 0) { setStatus('保存するデータがありません', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; setStatus('保存中...', '');

  let running = 0;
  let ok = 0, ng = 0;
  for (const row of allRows) {
    const amt = parseFloat(row.amount) || 0;
    if (row.type === 'income') running += amt; else running -= amt;
    try {
      await fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: row.date ? new Date(row.date + 'T00:00:00').toLocaleDateString('ja-JP') : '',
          type: row.type === 'income' ? '収入' : '支出',
          name: row.name || row.category,
          category: row.category,
          amount: amt,
          balance: running
        })
      });
      ok++;
    } catch(e) { ng++; }
  }
  btn.disabled = false;
  setStatus(ng === 0 ? `✓ ${ok}件を保存しました` : `${ok}件成功、${ng}件失敗`, ng === 0 ? 'success' : 'error');
}

function formatDate(val) {
  if (!val) return '';
  if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}$/)) {
    const parts = val.split('-');
    return parseInt(parts[1]) + '/' + parseInt(parts[2]);
  }
  if (!val) return '';
  if (typeof val === 'string' && val.includes('T')) {
    const d = new Date(val);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }
  return String(val);
}

async function loadFromSheets() {
  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  setStatus('読み込み中...', '');
  try {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    if (json.result !== 'success') throw new Error(json.message);

    incomeRows = [];
    expenseRows = [];
    rowId = 0;

    json.data.forEach(row => {
      const id = rowId++;
      const type = row['種別'] === '収入' ? 'income' : 'expense';
      const entry = {
        id,
        date: formatDate(row['日付']),
        name: row['摘要'] || '',
        category: row['カテゴリ'] || '',
        amount: row['金額'] || ''
      };
      if (type === 'income') incomeRows.push(entry);
      else expenseRows.push(entry);
    });

    renderRows('income');
    renderRows('expense');
    updateSummary();
    setStatus(`✓ ${json.data.length}件を読み込みました`, 'success');
  } catch(e) {
    setStatus('読み込みに失敗しました', 'error');
  }
  btn.disabled = false;
}

function setStatus(msg, type) {
  const el = document.getElementById('save-status');
  el.textContent = msg; el.className = 'save-status ' + type;
}

function copyReport() {
  const table = document.querySelector('.report-table');
  if (!table) { setStatus('コピーするレポートがありません', 'error'); return; }
  const rows = table.querySelectorAll('tr');
  const lines = Array.from(rows).map(row =>
    Array.from(row.querySelectorAll('th,td')).map(cell => cell.textContent.trim()).join('\t')
  );
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = 'テキストをコピー', 2000);
  });
}

initMonth(); addRow('income'); addRow('expense');
</script>
</body>
</html>
